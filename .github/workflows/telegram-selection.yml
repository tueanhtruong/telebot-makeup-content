name: Telegram Selection and Post

on:
  schedule:
    # Run every 20 minutes
    - cron: "*/20 * * * *"
  workflow_dispatch:

jobs:
  select-and-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore Telegram session
        env:
          SESSION_BASE64: ${{ secrets.TELEGRAM_SESSION_BASE64 }}
        run: |
          if [ -n "$SESSION_BASE64" ]; then
            echo "$SESSION_BASE64" | base64 -d > telethon_session.session
            echo "Telegram session file restored"
          else
            echo "No session file found in secrets - will need to authenticate"
          fi

      - name: Run selection action script
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_NAME: ${{ secrets.TELEGRAM_SESSION_NAME || 'telethon_session' }}
          TELEGRAM_CHANNEL_USERNAMES: ${{ secrets.TELEGRAM_CHANNEL_USERNAMES }}
          TELEGRAM_CHANNEL_IDS: ${{ secrets.TELEGRAM_CHANNEL_IDS }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_WINDOW_SECONDS: ${{ secrets.TELEGRAM_WINDOW_SECONDS || '3600' }}
          TELEGRAM_FETCH_LIMIT: ${{ secrets.TELEGRAM_FETCH_LIMIT || '200' }}
          TELEGRAM_CHANNEL_MEDIA_USERNAME: ${{ secrets.TELEGRAM_CHANNEL_MEDIA_USERNAME }}
          TELEGRAM_CHANNEL_MEDIA_ID: ${{ secrets.TELEGRAM_CHANNEL_MEDIA_ID }}
          TELEGRAM_MEDIA_WINDOW_SECONDS: ${{ secrets.TELEGRAM_MEDIA_WINDOW_SECONDS || '1200' }}
          TELEGRAM_MEDIA_FETCH_LIMIT: ${{ secrets.TELEGRAM_MEDIA_FETCH_LIMIT || '100' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FACEBOOK_TOKEN: ${{ secrets.FACEBOOK_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
        run: |
          python selection_action.py
