name: Run Telegram Channel 1 Analysis and Post

on:
  schedule:
    # Run every 40 minutes
    - cron: "*/40 * * * *"
  workflow_dispatch:

jobs:
  poll-and-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore Telegram session
        env:
          SESSION_BASE64: ${{ secrets.TELEGRAM_SESSION_BASE64 }}
        run: |
          if [ -n "$SESSION_BASE64" ]; then
            echo "$SESSION_BASE64" | base64 -d > telethon_session.session
            echo "Telegram session file restored"
          else
            echo "No session file found in secrets - will need to authenticate"
          fi

      - name: Run action script
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_NAME: ${{ secrets.TELEGRAM_SESSION_NAME || 'telethon_session' }}

          TELEGRAM_WINDOW_SECONDS: "3600"
          TELEGRAM_FETCH_LIMIT: "200"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FACEBOOK_TOKEN: ${{ secrets.FACEBOOK_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          LLM_PROVIDER: "gemini"
          TELEGRAM_CONTENT_FILTER: "text"
          TELEGRAM_CHANNEL_1_USERNAME: ${{ secrets.TELEGRAM_CHANNEL_1_USERNAME }}
          TELEGRAM_CHANNEL_1_ID: ${{ secrets.TELEGRAM_CHANNEL_1_ID }}
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          GROK_MODEL: ${{ secrets.GROK_MODEL || 'grok-4-fast-reasoning' }}

        run: |
          python channels/channel1.py
